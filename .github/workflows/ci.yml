name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Verify OpenAPI generation is up-to-date
        run: |
          bun run --cwd packages/openapi generate
          git diff --exit-code -- packages/openapi/generated packages/openapi/src/client/index.ts

      - name: Build all workspaces
        run: bun run build

      - name: Check CLI package size
        run: bun run check:cli-pack-size

      - name: Run unit tests
        run: bun run test

  local-stack-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Start local stack
        run: docker compose up -d

      - name: Wait for Listmonk health
        run: |
          for i in $(seq 1 60); do
            if curl -fsS http://localhost:9000/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          echo "Listmonk health check timed out"
          exit 1

      - name: Run CLI smoke checks
        env:
          LISTMONK_OPS_SMOKE_LOG_DIR: /tmp/listmonk-ops-smoke
          LISTMONK_OPS_SMOKE_REPORT: /tmp/listmonk-ops-smoke/report.json
        run: bun run ops:smoke

      - name: Run MCP E2E tests
        run: bun run test:e2e

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: local-stack-smoke
          path: /tmp/listmonk-ops-smoke

      - name: Dump compose logs on failure
        if: failure()
        run: docker compose logs --tail=200
