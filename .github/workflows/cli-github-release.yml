name: CLI GitHub Release

on:
  push:
    tags:
      - "*cli-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. listmonk-ops-cli-v0.2.1)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: macos-13
            platform: darwin
            arch: x64
          - os: macos-latest
            platform: darwin
            arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build native CLI binary
        run: bun run --cwd apps/cli build:bin

      - name: Package release asset
        run: |
          mkdir -p release-assets
          cp apps/cli/dist/bin/listmonk-cli "release-assets/listmonk-cli-${{ matrix.platform }}-${{ matrix.arch }}"
          tar -czf "release-assets/listmonk-cli-${{ matrix.platform }}-${{ matrix.arch }}.tar.gz" \
            -C release-assets "listmonk-cli-${{ matrix.platform }}-${{ matrix.arch }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.platform }}-${{ matrix.arch }}
          path: release-assets/*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: cli-*
          merge-multiple: true
          path: release-assets

      - name: Compute checksums
        run: |
          cd release-assets
          sha256sum *.tar.gz > checksums.txt

      - name: Resolve release tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          files: |
            release-assets/*.tar.gz
            release-assets/checksums.txt
