name: Sampo Release Publish

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  id-token: write

concurrency:
  group: sampo-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-and-publish:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    env:
      SAMPO_RELEASE_BRANCH: main
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Setup Node.js (npm OIDC compatible)
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Verify npm version for trusted publishing
        run: |
          set -euo pipefail
          node_version="$(node --version | sed 's/^v//')"
          npm_version="$(npm --version)"
          echo "Node ${node_version}"
          echo "npm ${npm_version}"
          node -e 'const [nodeVersion, npmVersion] = process.argv.slice(1); const gte=(a,b)=>{for(let i=0;i<3;i++){const x=(a[i]??0),y=(b[i]??0); if(x>y) return true; if(x<y) return false;} return true;}; const parse=(v)=>v.split(".").map(Number); if(!gte(parse(nodeVersion), [22,14,0])){console.error("Node >= 22.14.0 is required for npm trusted publishing"); process.exit(1);} if(!gte(parse(npmVersion), [11,5,1])){console.error("npm >= 11.5.1 is required for trusted publishing"); process.exit(1);}' "$node_version" "$npm_version"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install Sampo
        run: cargo install sampo --locked

      - name: Check release plan
        id: plan
        run: |
          set +e
          sampo release --dry-run
          code=$?
          set -e
          if [ "$code" -eq 2 ]; then
            echo "should_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$code" -ne 0 ]; then
            exit "$code"
          fi
          echo "should_release=true" >> "$GITHUB_OUTPUT"

      - name: Apply version/changelog updates
        if: steps.plan.outputs.should_release == 'true'
        run: sampo release

      - name: Build workspaces with Bun
        if: steps.plan.outputs.should_release == 'true'
        run: bun run build

      - name: Commit release changes
        if: steps.plan.outputs.should_release == 'true'
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No release changes to commit."
            exit 0
          fi
          git commit -m "chore(release): apply sampo release [skip ci]"

      - name: Publish to npm via OIDC
        if: steps.plan.outputs.should_release == 'true'
        run: sampo publish -- --access public --provenance

      - name: Push release commit
        if: steps.plan.outputs.should_release == 'true'
        run: git push origin HEAD:main

      - name: Push git tags
        if: steps.plan.outputs.should_release == 'true'
        run: git push origin --tags
