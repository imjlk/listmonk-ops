name: Sampo Release Publish

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  actions: write
  contents: write
  pull-requests: write
  id-token: write

concurrency:
  group: sampo-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release-and-publish:
    runs-on: ubuntu-latest
    env:
      SAMPO_RELEASE_BRANCH: main
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect pending changesets
        id: changesets
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          pending=false
          for changeset in .sampo/changesets/*.md; do
            if [[ "$(basename "$changeset")" != ".gitignore" ]]; then
              pending=true
              break
            fi
          done
          echo "pending=${pending}" >> "$GITHUB_OUTPUT"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Setup Node.js (npm OIDC compatible)
        if: steps.changesets.outputs.pending == 'false'
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Verify npm version for trusted publishing
        if: steps.changesets.outputs.pending == 'false'
        run: |
          set -euo pipefail
          node_version="$(node --version | sed 's/^v//')"
          npm_version="$(npm --version)"
          echo "Node ${node_version}"
          echo "npm ${npm_version}"
          node -e 'const [nodeVersion, npmVersion] = process.argv.slice(1); const gte=(a,b)=>{for(let i=0;i<3;i++){const x=(a[i]??0),y=(b[i]??0); if(x>y) return true; if(x<y) return false;} return true;}; const parse=(v)=>v.split(".").map(Number); if(!gte(parse(nodeVersion), [22,14,0])){console.error("Node >= 22.14.0 is required for npm trusted publishing"); process.exit(1);} if(!gte(parse(npmVersion), [11,5,1])){console.error("npm >= 11.5.1 is required for trusted publishing"); process.exit(1);}' "$node_version" "$npm_version"

      - name: Install dependencies
        if: steps.changesets.outputs.pending == 'false'
        run: bun install --frozen-lockfile

      - name: Build workspaces with Bun
        if: steps.changesets.outputs.pending == 'false'
        run: bun run build

      - name: Detect pending CLI binary release
        id: cli_release
        if: steps.changesets.outputs.pending == 'false'
        shell: bash
        run: |
          set -euo pipefail
          cli_version="$(node -p 'require("./apps/cli/package.json").version')"
          cli_tag="@listmonk-ops/cli-v${cli_version}"
          pending=true
          if git ls-remote --exit-code --tags origin "refs/tags/${cli_tag}" >/dev/null 2>&1; then
            pending=false
          fi
          echo "tag=${cli_tag}" >> "$GITHUB_OUTPUT"
          echo "pending=${pending}" >> "$GITHUB_OUTPUT"

      - name: Route Sampo publishes through npm OIDC
        if: steps.changesets.outputs.pending == 'false'
        run: |
          set -euo pipefail
          real_bun="$(command -v bun)"
          wrapper_dir="${RUNNER_TEMP}/sampo-npm-bin"
          mkdir -p "$wrapper_dir"
          cat >"${wrapper_dir}/bun" <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail

          if [[ "${1:-}" != "publish" ]]; then
            exec "${REAL_BUN}" "$@"
          fi

          shift
          pack_dir="$(mktemp -d "${RUNNER_TEMP}/sampo-npm-pack.XXXXXX")"
          trap 'rm -rf "$pack_dir"' EXIT

          tarball="$("${REAL_BUN}" pm pack --destination "$pack_dir" --ignore-scripts --quiet | tail -n 1)"
          if [[ "$tarball" != /* ]]; then
            tarball="${pack_dir}/${tarball#./}"
          fi
          if [[ ! -f "$tarball" ]]; then
            echo "Packed tarball not found: $tarball" >&2
            exit 1
          fi

          npm publish "$tarball" "$@"
          EOF
          chmod +x "${wrapper_dir}/bun"
          echo "REAL_BUN=${real_bun}" >> "$GITHUB_ENV"
          echo "$wrapper_dir" >> "$GITHUB_PATH"

      - name: Create release PR or publish packages
        id: sampo
        uses: bruits/sampo/crates/sampo-github-action@91bbcc250a37178571054ef8399fac1b52d67740
        with:
          command: auto
          base-branch: main
          pr-branch: sampo/release
          pr-title: "chore(release): publish packages"
          npm-args: --access public --provenance
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SAMPO_RELEASE_BRANCH: main

      - name: Dispatch CLI binary release
        if: steps.sampo.outputs.published == 'true' && steps.cli_release.outputs.pending == 'true'
        shell: bash
        env:
          CLI_RELEASE_TAG: ${{ steps.cli_release.outputs.tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if ! git ls-remote --exit-code --tags origin "refs/tags/${CLI_RELEASE_TAG}" >/dev/null 2>&1; then
            echo "Sampo did not publish ${CLI_RELEASE_TAG}; skipping CLI binary release."
            exit 0
          fi
          gh workflow run cli-github-release.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref main \
            --raw-field "tag=${CLI_RELEASE_TAG}"
